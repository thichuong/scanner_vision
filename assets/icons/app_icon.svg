<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient: Deep Indigo to Vibrant Purple -->
    <linearGradient id="bg_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5" />
      <stop offset="100%" style="stop-color:#9333EA" />
    </linearGradient>

    <!-- Glass Effect Gradient -->
    <linearGradient id="glass_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF; stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#FFFFFF; stop-opacity:0.05" />
    </linearGradient>

    <!-- Scanning Beam Gradient: Cyan to Hot Pink -->
    <linearGradient id="beam_gradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#22D3EE; stop-opacity:0" />
      <stop offset="20%" style="stop-color:#22D3EE; stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EC4899; stop-opacity:1" />
      <stop offset="80%" style="stop-color:#22D3EE; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE; stop-opacity:0" />
    </linearGradient>

    <!-- Glow Effect Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="document_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Main Background Container -->
  <rect width="512" height="512" rx="110" fill="url(#bg_gradient)" />

  <!-- Subtle Inner Border -->
  <rect x="20" y="20" width="472" height="472" rx="95" stroke="white" stroke-opacity="0.1" stroke-width="2" />

  <!-- Document Silhouette (Glassmorphism effect) -->
  <g filter="url(#document_glow)">
    <path d="M140 100H320L372 152V412H140V100Z" fill="url(#glass_gradient)" stroke="white" stroke-opacity="0.3" stroke-width="4" stroke-linejoin="round" />
    <!-- Lines inside document -->
    <rect x="180" y="180" width="120" height="6" rx="3" fill="white" fill-opacity="0.2" />
    <rect x="180" y="210" width="150" height="6" rx="3" fill="white" fill-opacity="0.2" />
    <rect x="180" y="240" width="150" height="6" rx="3" fill="white" fill-opacity="0.2" />
    <rect x="180" y="320" width="150" height="6" rx="3" fill="white" fill-opacity="0.2" />
    <rect x="180" y="350" width="100" height="6" rx="3" fill="white" fill-opacity="0.2" />
  </g>

  <!-- Scanning Beam with Glow -->
  <g filter="url(#glow)">
    <rect x="80" y="270" width="352" height="12" rx="6" fill="url(#beam_gradient)" />
    <!-- Dynamic Eye/Lens Centerpiece -->
    <circle cx="256" cy="276" r="35" fill="#1E1B4B" stroke="#22D3EE" stroke-width="4" />
    <circle cx="256" cy="276" r="14" fill="#EC4899">
      <!-- Symbolic Inner Vision -->
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Abstract Tech Accents -->
  <circle cx="100" cy="100" r="40" fill="white" fill-opacity="0.03" />
  <circle cx="412" cy="412" r="60" fill="white" fill-opacity="0.03" />
  
  <path d="M80 140V80H140" stroke="#22D3EE" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M432 140V80H372" stroke="#22D3EE" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M80 372V432H140" stroke="#22D3EE" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M432 372V432H372" stroke="#22D3EE" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />

</svg>
