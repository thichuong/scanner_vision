<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bg_grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F2027"/>
      <stop offset="0.5" stop-color="#203A43"/>
      <stop offset="1" stop-color="#2C5364"/>
    </linearGradient>
    <linearGradient id="beam_grad" x1="100" y1="256" x2="412" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F2FE" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#4FACFE"/>
      <stop offset="1" stop-color="#00F2FE" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Rounded Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg_grad)"/>
  
  <!-- Subtle Outer Ring -->
  <rect x="20" y="20" width="472" height="472" rx="100" stroke="white" stroke-opacity="0.05" stroke-width="2"/>

  <!-- Document Silhouette -->
  <g opacity="0.8">
    <path d="M140 100H330L372 142V412H140V100Z" fill="white" fill-opacity="0.05"/>
    <path d="M140 100H330L372 142V412H140V100Z" stroke="white" stroke-width="8" stroke-linejoin="round"/>
    <!-- Lines in Document -->
    <rect x="170" y="160" width="130" height="6" rx="3" fill="white" fill-opacity="0.2"/>
    <rect x="170" y="190" width="170" height="6" rx="3" fill="white" fill-opacity="0.2"/>
    <rect x="170" y="220" width="170" height="6" rx="3" fill="white" fill-opacity="0.2"/>
    <rect x="170" y="310" width="170" height="6" rx="3" fill="white" fill-opacity="0.2"/>
    <rect x="170" y="340" width="100" height="6" rx="3" fill="white" fill-opacity="0.2"/>
  </g>

  <!-- Scanning Beam -->
  <g filter="url(#glow)">
    <rect x="100" y="250" width="312" height="12" rx="6" fill="url(#beam_grad)"/>
    <!-- Central Lens/Vision Eye -->
    <circle cx="256" cy="256" r="30" fill="#0F2027" stroke="#4FACFE" stroke-width="4"/>
    <circle cx="256" cy="256" r="12" fill="#4FACFE">
      <animate attributeName="r" values="10;14;10" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- High-tech Corner Details -->
  <path d="M100 150V100H150" stroke="#4FACFE" stroke-width="6" stroke-linecap="round"/>
  <path d="M412 150V100H362" stroke="#4FACFE" stroke-width="6" stroke-linecap="round"/>
  <path d="M100 362V412H150" stroke="#4FACFE" stroke-width="6" stroke-linecap="round"/>
  <path d="M412 362V412H362" stroke="#4FACFE" stroke-width="6" stroke-linecap="round"/>
</svg>
